<!DOCTYPE html>
<html>
<head>
    <title>Cafe Bliss ☕</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f8f5f2;
        }

        header {
            background: linear-gradient(45deg, #6b4226, #8b5e3c);
            color: white;
            padding: 30px;
            text-align: center;
        }

        section {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .menu-item {
            background: #f1f1f1;
            margin: 10px auto;
            padding: 12px;
            border-radius: 8px;
            width: 80%;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: #ddd;
            transform: scale(1.03);
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 60%;
            margin-right: 5px;
        }

        #qtyInput {
            width: 80px;
        }

        button {
            padding: 10px 15px;
            background: #6b4226;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #8b5e3c;
            transform: scale(1.05);
        }

        #orderList {
            list-style: none;
            padding: 0;
        }

        #orderList li {
            background: #f1f1f1;
            margin: 8px auto;
            padding: 10px;
            border-radius: 8px;
            width: 80%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Cafe Bliss ☕</h1>
    <p>Fresh Coffee, Happy Mood</p>
</header>

<section>
    <h2>📍 Address</h2>
    <p>Hill Cart Road, Siliguri</p>

    <h2>⏰ Timings</h2>
    <p>9:00 AM - 9:30 PM</p>
</section>

<section>
    <h2>🍽️ Menu</h2>

<div class="menu-item" onclick="quickOrder('espresso', 100)">Espresso - ₹100</div>
<div class="menu-item" onclick="quickOrder('cappuccino', 150)">Cappuccino - ₹150</div>
<div class="menu-item" onclick="quickOrder('cold coffee', 120)">Cold Coffee - ₹120</div>
<div class="menu-item" onclick="quickOrder('black coffee', 50)">Black Coffee - ₹50</div>
<div class="menu-item" onclick="quickOrder('sandwich', 70)">Sandwich - ₹70</div>
<div class="menu-item" onclick="quickOrder('grilled sandwich', 100)">Grilled Sandwich - ₹100</div>
</section>

<section>
    <h2>📞 Contact</h2>
    <p>+91 9876543210</p>
</section>

<section>
    <h2>🛒 Place Order</h2>

    <input id="orderInput" placeholder="Enter item name">
    <input id="qtyInput" type="number" min="1" value="1">
    <button onclick="placeOrder()">Order</button>

    <h3>📦 Active Orders</h3>
    <ul id="orderList"></ul>
</section>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let menuItems = [
    "espresso",
    "cappuccino",
    "cold coffee",
    "black coffee",
    "sandwich",
    "grilled sandwich"
];

// ✅ QUICK ORDER (click menu → ask quantity)
function quickOrder(item) {
    let qty = prompt("Enter quantity:", "1");

    qty = parseInt(qty);

    if (!qty || qty <= 0) return;

    placeOrder(item, qty);
}

// ✅ MAIN ORDER FUNCTION
function placeOrder(item, qtyFromClick) {
    if (!item) {
        item = document.getElementById("orderInput").value.toLowerCase();
    }

    let qty = qtyFromClick || parseInt(document.getElementById("qtyInput").value);

    if (!item || qty <= 0) return;

    if (!menuItems.includes(item)) {
        alert("❌ Item not available in menu");
        return;
    }

    let order = {
        id: Date.now(),
        item: item,
        qty: qty,
        timeLeft: Math.floor(Math.random() * 5) + 1
    };

    orders.push(order);
    localStorage.setItem("orders", JSON.stringify(orders));

    document.getElementById("orderInput").value = "";
    document.getElementById("qtyInput").value = 1;

    renderOrders();
}

// ✅ RENDER ORDERS
function renderOrders() {
    let list = document.getElementById("orderList");
    list.innerHTML = "";

    orders.forEach(order => {
        let li = document.createElement("li");

        li.innerText = `Order ${order.id} (${order.item} x${order.qty}) - Preparing... ${order.timeLeft} min`;

        let btn = document.createElement("button");
        btn.innerText = "❌";
        btn.style.marginLeft = "10px";

        btn.onclick = function () {
            orders = orders.filter(o => o.id !== order.id);
            localStorage.setItem("orders", JSON.stringify(orders));
            renderOrders();
        };

        li.appendChild(btn);
        list.appendChild(li);
    });
}

// ✅ LOAD ON REFRESH
renderOrders();
</script>

</body>
</html>
