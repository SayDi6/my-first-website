<!DOCTYPE html>
<html>
<head>
    <title>Cafe Bliss ☕</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f8f5f2;
        }

        header {
            background: linear-gradient(45deg, #6b4226, #8b5e3c);
            color: white;
            padding: 30px;
            text-align: center;
        }

        section {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .menu-item {
            background: #f1f1f1;
            margin: 10px auto;
            padding: 12px;
            border-radius: 8px;
            width: 80%;
        }

        input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 60%;
            margin-right: 5px;
        }

        button {
            padding: 10px 15px;
            background: #6b4226;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #8b5e3c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Cafe Bliss ☕</h1>
    <p>Fresh Coffee, Happy Mood</p>
</header>

<section>
    <h2>📍 Address</h2>
    <p>Hill Cart Road, Siliguri</p>

    <h2>⏰ Timings</h2>
    <p>9:00 AM - 9:30 PM</p>
</section>

<section>
    <h2>🍽️ Menu</h2>

    <div class="menu-item">Espresso - ₹100</div>
    <div class="menu-item">Cappuccino - ₹150</div>
    <div class="menu-item">Cold Coffee - ₹120</div>
    <div class="menu-item">Black Coffee - ₹50</div>
    <div class="menu-item">Sandwich - ₹70</div>
    <div class="menu-item">Grilled Sandwich - ₹100</div>
</section>

<section>
    <h2>📞 Contact</h2>
    <p>+91 9876543210</p>
</section>

<section>
    <h2>🛒 Place Order</h2>

    <input id="orderInput" placeholder="Enter item name">
    <button onclick="placeOrder()">Order</button>

    <p id="orderStatus"></p>
    <h3>📦 Active Orders</h3>
<ul id="orderList"></ul>
</section>

<script>
    let menuItems = ["espresso", "cappuccino", "cold coffee", "black coffee", "sandwich", "grilled sandwich"];
    
function placeOrder() {
    let item = document.getElementById("orderInput").value.toLowerCase();

    if (item === "") return;

    // ✅ Check if item exists
    if (!menuItems.includes(item)) {
        alert("❌ Item not available in menu");
        return;
    }

    let orderId = Math.floor(Math.random() * 1000);
    let timeLeft = Math.floor(Math.random() * 5) + 1;

    let li = document.createElement("li");

    li.innerText = "Order " + orderId + " (" + item + ") - Preparing... " + timeLeft + " min";

    document.getElementById("orderList").appendChild(li);

    let interval = setInterval(() => {
        timeLeft--;

        if (timeLeft > 0) {
            li.innerText = "Order " + orderId + " (" + item + ") - Preparing... " + timeLeft + " min";
        } else {
            li.innerText = "Order " + orderId + " (" + item + ") - Ready! ☕";
            clearInterval(interval);
        }
    }, 60000);

    document.getElementById("orderInput").value = "";
}
</script>

</body>
</html>
