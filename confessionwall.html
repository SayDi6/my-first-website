<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 30px;
    }

    h2, h3 {
      position: relative;
      z-index: 10;
    }

    input, button {
      position: relative;
      z-index: 10;
    }

    #confessionList {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      overflow: hidden;
    }

    @keyframes floatBubble {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }

      100% {
        transform: translateY(0px);
      }
    }
  </style>
</head>

<body>

<h2>🕵️ Anonymous Confession Wall</h2>

<button onclick="connectWallet()" style="padding:8px 12px;">
  Connect Wallet
</button>

<br><br>

<input
  id="message"
  placeholder="Write your confession..."
  style="padding:10px; width:250px;"
/>

<button onclick="postConfession()" style="padding:10px;">
  Post
</button>

<br><br>

<h3>🫧 Floating Confessions</h3>

<div id="confessionList"></div>

<!-- ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
const contractAddress = "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

const abi = [
  "function postConfession(string memory _message) payable",
  "function getTotalConfessions() view returns (uint256)",
  "function confessions(uint256) view returns (string memory, uint256, uint256)"
];

let provider;
let signer;
let contract;

// 🌐 Public provider
const readProvider =
  new ethers.providers.JsonRpcProvider(
    "https://mainnet.base.org"
  );

const readContract =
  new ethers.Contract(
    contractAddress,
    abi,
    readProvider
  );

// 🔹 Connect Wallet
async function connectWallet() {

  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  try {

    await window.ethereum.request({
      method: "eth_requestAccounts"
    });

    provider =
      new ethers.providers.Web3Provider(window.ethereum);

    signer = provider.getSigner();

    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x2105" }]
    });

    contract =
      new ethers.Contract(
        contractAddress,
        abi,
        signer
      );

    alert("Wallet Connected ✅");

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

// 🔹 Post confession
async function postConfession() {

  if (!contract) {
    alert("Connect wallet first");
    return;
  }

  const msg =
    document.getElementById("message").value;

  if (!msg) {
    alert("Write something first");
    return;
  }

  try {

    const tx =
      await contract.postConfession(msg, {
        value: ethers.utils.parseEther("0.00001")
      });

    await tx.wait();

    document.getElementById("message").value = "";

    await loadConfessions();

  } catch (err) {
    console.error(err);
    alert("Transaction failed");
  }
}

// ⏱ Time formatter
function formatTime(ts) {

  const now =
    Math.floor(Date.now() / 1000);

  const diff = now - ts;

  if (diff < 60)
    return "Just now";

  if (diff < 3600) {

    const m =
      Math.floor(diff / 60);

    return m + (m === 1
      ? " min ago"
      : " mins ago");
  }

  if (diff < 86400) {

    const h =
      Math.floor(diff / 3600);

    return h + (h === 1
      ? " hour ago"
      : " hours ago");
  }

  if (diff < 2592000) {

    const d =
      Math.floor(diff / 86400);

    return d + (d === 1
      ? " day ago"
      : " days ago");
  }

  const y =
    Math.floor(diff / 31536000);

  return y + (y === 1
    ? " year ago"
    : " years ago");
}

// 🫧 Load bubbles
async function loadConfessions() {

  try {

    const total =
      await readContract.getTotalConfessions();

    const list =
      document.getElementById("confessionList");

    list.innerHTML = "";

    const promises = [];

    for (let i = 0; i < total; i++) {
      promises.push(
        readContract.confessions(i)
      );
    }

    const results =
      await Promise.all(promises);

    const placedBubbles = [];

    results.reverse().forEach((c) => {

      const div =
        document.createElement("div");

      // 🫧 Random bubble size
      const size =
        Math.floor(Math.random() * 50) + 70;

      div.style.width = size + "px";
      div.style.height = size + "px";

      // 🫧 Position
      div.style.position = "absolute";

      const maxX =
        window.innerWidth - size - 60;

      const maxY =
        window.innerHeight - size - 260;

      let x, y;
      let overlapping;

      do {

        overlapping = false;

        x = Math.random() * maxX;
        y = Math.random() * maxY;

        for (const bubble of placedBubbles) {

          const dx = bubble.x - x;
          const dy = bubble.y - y;

          const distance =
            Math.sqrt(dx * dx + dy * dy);

          if (
            distance <
            (bubble.size / 2 + size / 2 + 25)
          ) {
            overlapping = true;
            break;
          }
        }

      } while (overlapping);

      placedBubbles.push({
        x,
        y,
        size
      });

      div.style.left = x + "px";
      div.style.top = y + "px";

      // 🫧 Bubble appearance
      div.style.borderRadius = "50%";

      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.justifyContent = "center";

      div.style.textAlign = "center";
      div.style.cursor = "pointer";

      div.style.padding = "15px";

      div.style.background =
        "radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(226,232,240,0.7))";

      div.style.backdropFilter =
        "blur(14px)";

      div.style.border =
        "1px solid rgba(148,163,184,0.25)";

      div.style.boxShadow =
        "0 8px 30px rgba(15,23,42,0.08)";

      div.style.transition = "0.3s";

      // ✨ Floating
      div.style.animation =
        `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

      // 🫧 Default look
      div.innerHTML = `
        <div style="
          width:12px;
          height:12px;
          border-radius:50%;
          background:rgba(255,255,255,0.45);
          box-shadow:0 0 10px rgba(255,255,255,0.35);
        ">
        </div>
      `;

      // ✨ Hover
      div.onmouseenter = () => {
        div.style.transform = "scale(1.08)";
      };

      div.onmouseleave = () => {
        div.style.transform = "scale(1)";
      };

      // 🔓 Reveal
      let revealed = false;

      div.onclick = () => {

        revealed = !revealed;

        if (revealed) {

          div.innerHTML = `
            <div>
              <p style="
                font-size:13px;
                margin:0;
                word-break:break-word;
              ">
                ${c[0]}
              </p>

              <br>

              <small style="
                opacity:0.8;
                font-size:10px;
              ">
                ${formatTime(c[1])}
              </small>
            </div>
          `;

        } else {

          div.innerHTML = `
            <div style="
              width:12px;
              height:12px;
              border-radius:50%;
              background:rgba(255,255,255,0.45);
              box-shadow:0 0 10px rgba(255,255,255,0.35);
            ">
            </div>
          `;
        }
      };

      list.appendChild(div);

    });

  } catch (err) {
    console.error(err);
  }
}

// 🔁 Auto connect
async function autoConnect() {

  if (!window.ethereum)
    return;

  const accounts =
    await window.ethereum.request({
      method: "eth_accounts"
    });

  if (accounts.length > 0) {

    provider =
      new ethers.providers.Web3Provider(window.ethereum);

    signer = provider.getSigner();

    const network =
      await provider.getNetwork();

    if (network.chainId !== 8453)
      return;

    contract =
      new ethers.Contract(
        contractAddress,
        abi,
        signer
      );
  }
}

// 🚀 Start
window.onload = async () => {

  await loadConfessions();

  await autoConnect();
};

// 🔁 Wallet events
if (window.ethereum) {

  window.ethereum.on(
    "accountsChanged",
    autoConnect
  );

  window.ethereum.on(
    "chainChanged",
    () => window.location.reload()
  );
}
</script>

</body>
</html>
