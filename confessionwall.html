<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 30px;
    }

    h2, h3,
    input, button,
    small {
      position: relative;
      z-index: 10;
    }

    #confessionList {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      overflow: hidden;
    }

    /* 🫧 Floating movement */
    @keyframes floatBubble {

      0% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }

      25% {
        transform:
          translateY(-10px)
          translateX(4px)
          scale(1.02);
      }

      50% {
        transform:
          translateY(-18px)
          translateX(-4px)
          scale(0.98);
      }

      75% {
        transform:
          translateY(-8px)
          translateX(3px)
          scale(1.01);
      }

      100% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }
    }

    /* 💥 Burst animation */
    @keyframes burstBubble {

      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      70% {
        transform: scale(1.25);
        opacity: 0.7;
        filter: blur(1px);
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
        filter: blur(4px);
      }
    }

    /* ✨ Text fade */
    @keyframes fadeIn {

      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <h2>🕵️ Anonymous Confession Wall</h2>

  <button
    onclick="connectWallet()"
    style="padding:8px 12px;"
  >
    Connect Wallet
  </button>

  <br><br>

  <input
    id="message"
    placeholder="Share an anonymous thought..."
    style="padding:10px; width:260px;"
  />

  <button
    onclick="postConfession()"
    style="padding:10px;"
  >
    Post
  </button>

  <br><br>

  <small
    id="charCounter"
    style="color:#64748b;"
  >
    0 / 125
  </small>

  <br><br>

  <h3>🫧 Floating Confessions</h3>

  <div id="confessionList"></div>

  <!-- ethers -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <script>

    const contractAddress =
      "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

    const abi = [
      "function postConfession(string memory _message) payable",
      "function getTotalConfessions() view returns (uint256)",
      "function confessions(uint256) view returns (string memory, uint256, uint256)"
    ];

    let provider;
    let signer;
    let contract;

    // 🌐 Public provider
    const readProvider =
      new ethers.providers.JsonRpcProvider(
        "https://mainnet.base.org"
      );

    const readContract =
      new ethers.Contract(
        contractAddress,
        abi,
        readProvider
      );

    // 🔹 Connect wallet
    async function connectWallet() {

      if (!window.ethereum) {

        alert("Install MetaMask");
        return;
      }

      try {

        await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        provider =
          new ethers.providers.Web3Provider(window.ethereum);

        signer = provider.getSigner();

        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0x2105" }]
        });

        contract =
          new ethers.Contract(
            contractAddress,
            abi,
            signer
          );

        alert("Wallet Connected ✅");

      } catch (err) {

        console.error(err);
        alert(err.message);
      }
    }

    // 🚨 Blocked words
    const blockedWords = [

      "kill",
      "murder",
      "bomb",
      "terror",
      "shoot",
      "stab",
      "kidnap",

      "rape",
      "pedo",
      "pedophile",

      "suicide",
      "selfharm",

      "fuck",
      "bitch",
      "sex",
      "anal",

      "nigga",
      "nigger",

      "genocide"
    ];

    // 🧼 Normalize
    function normalizeMessage(text) {

      return text

        .toLowerCase()

        .replace(/4/g, "a")
        .replace(/1/g, "i")
        .replace(/3/g, "e")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")

        .replace(/\s+/g, "")

        .replace(/[^a-z0-9]/g, "")

        .replace(/(.)\1+/g, "$1");
    }

    // 🔢 Character counter
    const messageInput =
      document.getElementById("message");

    const charCounter =
      document.getElementById("charCounter");

    messageInput.addEventListener("input", () => {

      // ✂️ Hard stop at 125
      if (
        messageInput.value.length > 125
      ) {

        messageInput.value =
          messageInput.value.slice(0, 125);
      }

      const length =
        messageInput.value.length;

      charCounter.innerText =
        `${length} / 125`;

      // ⚪ normal
      if (length < 100) {

        charCounter.style.color =
          "#64748b";
      }

      // 🟡 warning
      else if (length < 125) {

        charCounter.style.color =
          "#eab308";
      }

      // 🔴 limit
      else {

        charCounter.style.color =
          "#ef4444";
      }
    });

    // 🔹 Post confession
    async function postConfession() {

      if (!contract) {

        alert("Connect wallet first");
        return;
      }

      const msg =
        document.getElementById("message")
        .value
        .trim();

      if (!msg) {

        alert("Write something first");
        return;
      }

      // 🌍 English only
      const englishOnly =
        /^[a-zA-Z0-9\s.,!?'"()-]+$/;

      if (!englishOnly.test(msg)) {

        alert(
          "Only standard English text is allowed currently"
        );

        return;
      }

      // 🧼 Clean message
      const cleanedMsg =
        normalizeMessage(msg);

      // 🚨 Block words
      for (const word of blockedWords) {

        if (cleanedMsg.includes(word)) {

          alert(
            "Restricted words detected"
          );

          return;
        }
      }

      // ⏳ Cooldown
      const now = Date.now();

      const lastPostTime =
        localStorage.getItem("lastPostTime");

      if (
        lastPostTime &&
        now - lastPostTime < 60000
      ) {

        alert(
          "Please wait 1 minute before posting again"
        );

        return;
      }

      // 🚫 Duplicate prevention
      let recentPosts =
        JSON.parse(
          localStorage.getItem("recentPosts")
        ) || [];

      if (
        recentPosts.includes(cleanedMsg)
      ) {

        alert(
          "Duplicate messages are not allowed"
        );

        return;
      }

      try {

        const tx =
          await contract.postConfession(msg, {
            value:
              ethers.utils.parseEther("0.00001")
          });

        await tx.wait();

        // 💾 Save cooldown
        localStorage.setItem(
          "lastPostTime",
          now
        );

        // 💾 Save recent
        recentPosts.push(cleanedMsg);

        if (recentPosts.length > 5) {
          recentPosts.shift();
        }

        localStorage.setItem(
          "recentPosts",
          JSON.stringify(recentPosts)
        );

        document.getElementById("message").value = "";

        charCounter.innerText = "0 / 125";
        charCounter.style.color = "#64748b";

        await loadConfessions();

      } catch (err) {

        console.error(err);
        alert("Transaction failed");
      }
    }

    // ⏱ Time formatter
    function formatTime(ts) {

      const now =
        Math.floor(Date.now() / 1000);

      const diff = now - ts;

      if (diff < 60)
        return "Just now";

      if (diff < 3600) {

        const m =
          Math.floor(diff / 60);

        return m +
          (m === 1
            ? " min ago"
            : " mins ago");
      }

      if (diff < 86400) {

        const h =
          Math.floor(diff / 3600);

        return h +
          (h === 1
            ? " hour ago"
            : " hours ago");
      }

      if (diff < 2592000) {

        const d =
          Math.floor(diff / 86400);

        return d +
          (d === 1
            ? " day ago"
            : " days ago");
      }

      const y =
        Math.floor(diff / 31536000);

      return y +
        (y === 1
          ? " year ago"
          : " years ago");
    }

    // 🫧 Load confessions
    async function loadConfessions() {

      try {

        const total =
          await readContract.getTotalConfessions();

        const list =
          document.getElementById("confessionList");

        list.innerHTML = "";

        const promises = [];

        const randomIndexes = new Set();

        const batchSize =
          Math.min(50, total);

        while (
          randomIndexes.size < batchSize
        ) {

          const randomIndex =
            Math.floor(Math.random() * total);

          randomIndexes.add(randomIndex);
        }

        for (const i of randomIndexes) {

          promises.push(
            readContract.confessions(i)
          );
        }

        const results =
          await Promise.all(promises);

        const placedBubbles = [];

        results.forEach((c) => {

          const div =
            document.createElement("div");

          // 🫧 Dynamic bubble size
          const textLength = c[0].length;

          let size;

          // short thoughts
          if (textLength < 40) {

            size =
              Math.floor(Math.random() * 25) + 70;
          }

          // medium thoughts
          else if (textLength < 80) {

            size =
              Math.floor(Math.random() * 30) + 95;
          }

          // longer thoughts
          else {

            size =
              Math.floor(Math.random() * 35) + 120;
          }

          div.style.width = size + "px";
          div.style.height = size + "px";

          div.style.position = "absolute";

          const maxX =
            window.innerWidth - size - 60;

          const maxY =
            window.innerHeight - size - 260;

          let x, y;
          let overlapping;

          do {

            overlapping = false;

            x = Math.random() * maxX;
            y = Math.random() * (maxY - 120) + 120;

            for (const bubble of placedBubbles) {

              const dx = bubble.x - x;
              const dy = bubble.y - y;

              const distance =
                Math.sqrt(dx * dx + dy * dy);

              if (
                distance <
                (bubble.size / 2 + size / 2 + 25)
              ) {

                overlapping = true;
                break;
              }
            }

          } while (overlapping);

          placedBubbles.push({
            x,
            y,
            size
          });

          div.style.left = x + "px";
          div.style.top = y + "px";

          // 🫧 Bubble style
          div.style.borderRadius = "50%";

          div.style.display = "flex";
          div.style.alignItems = "center";
          div.style.justifyContent = "center";

          div.style.textAlign = "center";

          div.style.cursor = "pointer";

          div.style.padding = "12px";

          div.style.background = `
            radial-gradient(
              circle at 30% 30%,
              rgba(255,255,255,0.55),
              rgba(191,219,254,0.22),
              rgba(147,197,253,0.08),
              rgba(255,255,255,0.03)
            )
          `;

          div.style.backdropFilter =
            "blur(14px)";

          div.style.border =
            "1.5px solid rgba(255,255,255,0.35)";

          div.style.boxShadow =
            `
            0 0 20px rgba(59,130,246,0.18),
            0 0 35px rgba(168,85,247,0.12),
            0 0 50px rgba(236,72,153,0.08)
            `;

          div.style.transition = "0.3s";

          div.style.overflow = "hidden";

          // ✨ Floating
          div.style.animation =
            `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

          // 🫧 Empty bubble
          div.innerHTML = "";

          // ✨ Hover
          div.onmouseenter = () => {
            div.style.transform = "scale(1.08)";
          };

          div.onmouseleave = () => {
            div.style.transform = "scale(1)";
          };

          // 🔓 Reveal
          let revealed = false;

          div.onclick = () => {

            revealed = !revealed;

            // 🔓 Open
            if (revealed) {

              div.style.animation =
                "burstBubble 0.35s ease";

              setTimeout(() => {

                div.style.animation =
                  `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

                div.innerHTML = `
                  <div style="
                    padding:10px;
                    color:#111827;
                    animation: fadeIn 0.5s ease;
                  ">
                    <p style="
                      font-size:12px;
                      margin:0;
                      word-break:break-word;
                      line-height:1.3;
                    ">
                      ${c[0]}
                    </p>

                    <br>

                    <small style="
                      opacity:0.7;
                      font-size:10px;
                    ">
                      ${formatTime(c[1])}
                    </small>
                  </div>
                `;

              }, 250);

              // ⏳ Fade away
              setTimeout(() => {

                if (revealed) {

                  div.style.transition =
                    "opacity 6s ease";

                  div.style.opacity = "0";

                  setTimeout(() => {

                    revealed = false;

                    div.style.opacity = "1";

                    div.style.transition = "0.3s";

                    div.innerHTML = "";

                  }, 6000);

                }

              }, 35000);
            }

            // 🔒 Close
            else {

              div.style.animation =
                "burstBubble 0.35s ease";

              setTimeout(() => {

                div.style.animation =
                  `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

                div.innerHTML = "";

              }, 250);
            }
          };

          list.appendChild(div);
        });

      } catch (err) {

        console.error(err);
      }
    }

    // 🔁 Auto connect
    async function autoConnect() {

      if (!window.ethereum)
        return;

      const accounts =
        await window.ethereum.request({
          method: "eth_accounts"
        });

      if (accounts.length > 0) {

        provider =
          new ethers.providers.Web3Provider(window.ethereum);

        signer = provider.getSigner();

        const network =
          await provider.getNetwork();

        if (network.chainId !== 8453)
          return;

        contract =
          new ethers.Contract(
            contractAddress,
            abi,
            signer
          );
      }
    }

    // 🚀 Start
    window.onload = async () => {

      await loadConfessions();

      await autoConnect();
    };

    // 🔁 Wallet events
    if (window.ethereum) {

      window.ethereum.on(
        "accountsChanged",
        autoConnect
      );

      window.ethereum.on(
        "chainChanged",
        () => window.location.reload()
      );
    }

  </script>

</body>
</html>
