<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 30px;
    }

    h2, h3,
    input, button,
    small {
      position: relative;
      z-index: 10;
    }

    #confessionList {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      overflow: hidden;
    }

    @keyframes floatBubble {

      0% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }

      25% {
        transform:
          translateY(-10px)
          translateX(4px)
          scale(1.02);
      }

      50% {
        transform:
          translateY(-18px)
          translateX(-4px)
          scale(0.98);
      }

      75% {
        transform:
          translateY(-8px)
          translateX(3px)
          scale(1.01);
      }

      100% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }
    }

    @keyframes burstBubble {

      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      70% {
        transform: scale(1.25);
        opacity: 0.7;
        filter: blur(1px);
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
        filter: blur(4px);
      }
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <h2>🕵️ Anonymous Confession Wall</h2>

  <button
    onclick="connectWallet()"
    style="
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#111827;
      color:white;
      font-weight:bold;
    "
  >
    Connect Wallet
  </button>

  <br><br>

  <input
    id="message"
    placeholder="Share an anonymous thought..."
    style="padding:10px; width:260px;"
  />

  <button
    onclick="postConfession()"
    style="padding:10px;"
  >
    Post
  </button>

  <br><br>

  <small
    id="charCounter"
    style="color:#64748b;"
  >
    0 / 125
  </small>

  <br><br>

  <h3>🫧 Floating Confessions</h3>

  <div id="confessionList"></div>

  <!-- ✅ ETHERS -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- ✅ Web3Modal -->
<script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>

<!-- ✅ WalletConnect -->
<script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider/dist/umd/index.min.js"></script>

<!-- ✅ Coinbase Wallet -->
<script src="https://cdn.jsdelivr.net/npm/@coinbase/wallet-sdk/dist/CoinbaseWalletSDK.umd.min.js"></script>

<script>

  let provider
  let signer
  let contract

  async function connectWallet() {

    try {

      const providerOptions = {

        walletconnect: {

          package:
            window.WalletConnectProvider.default,

          options: {

            rpc: {
              8453:
                "https://mainnet.base.org"
            },

            chainId: 8453
          }
        },

        coinbasewallet: {

          package:
            window.CoinbaseWalletSDK,

          options: {

            appName:
              "Anonymous Confession Wall",

            rpc:
              "https://mainnet.base.org",

            chainId: 8453,

            darkMode: true
          }
        }
      }

      const web3Modal =
        new window.Web3Modal.default({

          cacheProvider: false,

          providerOptions,

          theme: "dark"
        })

      const connection =
        await web3Modal.connect()

      provider =
        new ethers.providers.Web3Provider(
          connection
        )

      signer =
        provider.getSigner()

      const network =
        await provider.getNetwork()

      if (network.chainId !== 8453) {

        await provider.send(
          "wallet_switchEthereumChain",
          [{ chainId: "0x2105" }]
        )
      }

      contract =
        new ethers.Contract(
          window.contractAddress,
          window.abi,
          signer
        )

      window.contract = contract

      alert("Wallet Connected ✅")

    } catch(err) {

      console.error(err)

      alert(
        "Wallet connection failed"
      )
    }
  }

</script>

  <!-- ✅ MAIN WEBSITE LOGIC -->
  <script>

    window.contractAddress =
      "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

    window.abi = [
      "function postConfession(string memory _message) payable",
      "function getTotalConfessions() view returns (uint256)",
      "function confessions(uint256) view returns (string memory, uint256, uint256)"
    ];

    const readProvider =
      new ethers.providers.JsonRpcProvider(
        "https://mainnet.base.org"
      );

    const readContract =
      new ethers.Contract(
        contractAddress,
        abi,
        readProvider
      );

    const blockedWords = [

      "kill",
      "murder",
      "bomb",
      "terror",
      "shoot",
      "stab",
      "kidnap",

      "rape",
      "pedo",
      "pedophile",

      "suicide",
      "selfharm",

      "fuck",
      "bitch",
      "sex",
      "anal",

      "nigga",
      "nigger",

      "genocide"
    ];

    function normalizeMessage(text) {

      return text

        .toLowerCase()

        .replace(/4/g, "a")
        .replace(/1/g, "i")
        .replace(/3/g, "e")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")

        .replace(/\s+/g, "")

        .replace(/[^a-z0-9]/g, "")

        .replace(/(.)\1+/g, "$1");
    }

    const messageInput =
      document.getElementById("message");

    const charCounter =
      document.getElementById("charCounter");

    messageInput.addEventListener("input", () => {

      if (
        messageInput.value.length > 125
      ) {

        messageInput.value =
          messageInput.value.slice(0, 125);
      }

      const length =
        messageInput.value.length;

      charCounter.innerText =
        `${length} / 125`;

      if (length < 100) {

        charCounter.style.color =
          "#64748b";

      } else if (length < 125) {

        charCounter.style.color =
          "#eab308";

      } else {

        charCounter.style.color =
          "#ef4444";
      }
    });

    async function postConfession() {

      if (!window.contract) {

        alert("Connect wallet first");
        return;
      }

      const msg =
        document.getElementById("message")
        .value
        .trim();

      if (!msg) {

        alert("Write something first");
        return;
      }

      try {

        const tx =
          await window.contract.postConfession(
            msg,
            {
              value:
                ethers.utils.parseEther(
                  "0.00001"
                )
            }
          );

        await tx.wait();

        document.getElementById(
          "message"
        ).value = "";

        charCounter.innerText =
          "0 / 125";

        await loadConfessions();

      } catch (err) {

        console.error(err);

        alert("Transaction failed");
      }
    }

    function formatTime(ts) {

      const now =
        Math.floor(Date.now() / 1000);

      const diff =
        now - ts;

      if (diff < 60)
        return "Just now";

      if (diff < 3600) {

        const m =
          Math.floor(diff / 60);

        return m +
          (m === 1
            ? " min ago"
            : " mins ago");
      }

      if (diff < 86400) {

        const h =
          Math.floor(diff / 3600);

        return h +
          (h === 1
            ? " hour ago"
            : " hours ago");
      }

      const d =
        Math.floor(diff / 86400);

      return d +
        (d === 1
          ? " day ago"
          : " days ago");
    }

    async function loadConfessions() {

      try {

        const total =
          await readContract.getTotalConfessions();

        const list =
          document.getElementById(
            "confessionList"
          );

        list.innerHTML = "";

        for (let i = 0; i < total; i++) {

          const c =
            await readContract.confessions(i);

          const div =
            document.createElement("div");

          div.style.width = "120px";
          div.style.height = "120px";
          div.style.position = "absolute";
          div.style.left =
            Math.random() * 80 + "%";
          div.style.top =
            Math.random() * 70 + "%";
          div.style.borderRadius = "50%";
          div.style.background =
            "rgba(255,255,255,0.3)";
          div.style.backdropFilter =
            "blur(10px)";
          div.style.display = "flex";
          div.style.alignItems = "center";
          div.style.justifyContent = "center";
          div.style.textAlign = "center";
          div.style.padding = "10px";
          div.style.cursor = "pointer";
          div.style.animation =
            "floatBubble 6s ease-in-out infinite";

          div.innerHTML = "";

          let revealed = false;

          div.onclick = () => {

            revealed = !revealed;

            if (revealed) {

              div.innerHTML = `
                <div>
                  <p style="
                    font-size:12px;
                    margin:0;
                  ">
                    ${c[0]}
                  </p>

                  <br>

                  <small>
                    ${formatTime(c[1])}
                  </small>
                </div>
              `;

            } else {

              div.innerHTML = "";
            }
          };

          list.appendChild(div);
        }

      } catch(err) {

        console.error(err)
      }
    }

    window.onload =
      async () => {

        await loadConfessions()
      }

  </script>

</body>
</html>
