<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>
</head>

<body style="font-family: Arial; background:#0f172a; color:white; padding:20px;">

<h2>🕵️ Anonymous Confession Wall</h2>

<button onclick="connectWallet()" style="padding:8px 12px;">Connect Wallet</button>

<br><br>

<input id="message" placeholder="Write your confession..." style="padding:10px; width:250px;" />
<button onclick="postConfession()" style="padding:10px;">Post</button>

<br><br>

<h3>📜 Confessions</h3>
<div id="confessionList"></div>

<!-- ethers -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
const contractAddress = "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

const abi = [
  "function postConfession(string memory _message) payable",
  "function tipConfession(uint256 index) payable",
  "function getTotalConfessions() view returns (uint256)",
  "function confessions(uint256) view returns (string memory, uint256, uint256)"
];

let provider;
let signer;
let contract;

// 🌐 Public read provider
const readProvider = new ethers.providers.JsonRpcProvider("https://mainnet.base.org");
const readContract = new ethers.Contract(contractAddress, abi, readProvider);

// 🔹 Connect Wallet
async function connectWallet() {
  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  await window.ethereum.request({ method: "eth_requestAccounts" });

  provider = new ethers.providers.Web3Provider(window.ethereum);
  signer = provider.getSigner();

  await window.ethereum.request({
    method: "wallet_switchEthereumChain",
    params: [{ chainId: "0x2105" }]
  });

  contract = new ethers.Contract(contractAddress, abi, signer);

  alert("Wallet Connected ✅");

  await loadConfessions();
}

// 🔹 Post
async function postConfession() {
  if (!contract) {
    alert("Connect wallet first");
    return;
  }

  const msg = document.getElementById("message").value;

  if (!msg) {
    alert("Write something first");
    return;
  }

  const tx = await contract.postConfession(msg, {
    value: ethers.utils.parseEther("0.00001")
  });

  await tx.wait();

  document.getElementById("message").value = "";

  await loadConfessions();
}

async function tipOwner() {
  if (!contract) {
    alert("Connect wallet first");
    return;
  }

  const tx = await contract.tipConfession(0, {
    value: ethers.utils.parseEther("0.00001")
  });

  await tx.wait();

  alert("Thanks for the tip ❤️");
}
  function formatTime(ts) {
  const now = Math.floor(Date.now() / 1000);
  const diff = now - ts;

  if (diff < 60) return "Just now";

  const units = [
    { s: 31536000, name: "year" },
    { s: 2592000, name: "month" },
    { s: 86400, name: "day" },
    { s: 3600, name: "hour" },
    { s: 60, name: "min" }
  ];

  for (let u of units) {
    const val = Math.floor(diff / u.s);
    if (val >= 1) {
      return val + " " + u.name + (val > 1 ? "s ago" : " ago");
    }
  }
}
// 🔥 Load Confessions (fast + UI)
async function loadConfessions() {
  try {
    const total = await readContract.getTotalConfessions();

    const list = document.getElementById("confessionList");
    list.innerHTML = "Loading... ⏳";

    const promises = [];
    for (let i = 0; i < total; i++) {
      promises.push(readContract.confessions(i));
    }

    const results = await Promise.all(promises);

    // 🔥 Sort by tips (premium feel)
    const sorted = results
      .map((c, i) => ({ data: c, index: i }))
      .sort((a, b) => b.data[2] - a.data[2]);

    list.innerHTML = "";

    sorted.forEach((item, i) => {
      const c = item.data;
      const actualIndex = item.index;

      const div = document.createElement("div");

      // 🌟 Highlight top confession
      if (i === 0 && Number(c[2]) > 0) {
        div.style.background = "linear-gradient(135deg, #facc15, #f97316)";
        div.style.color = "black";
      } else {
        div.style.background = "#1e293b";
      }

      div.style.padding = "15px";
      div.style.marginBottom = "12px";
      div.style.borderRadius = "10px";

      div.innerHTML = `
     <p><b>#${actualIndex}</b> ${c[0]}</p>
     <small>${formatTime(c[1])}</small>
     ${i === 0 && Number(c[2]) > 0 ? "<br><b>🔥 Spotlight</b>" : ""}
    `;

      list.appendChild(div);
    });

  } catch (err) {
    console.error(err);
  }
}

// 🔁 Auto connect
async function autoConnect() {
  if (!window.ethereum) return;

  const accounts = await window.ethereum.request({ method: "eth_accounts" });

  if (accounts.length > 0) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    const network = await provider.getNetwork();
    if (network.chainId !== 8453) return;

    contract = new ethers.Contract(contractAddress, abi, signer);

    await loadConfessions();
  }
}

// 🔁 Events
if (window.ethereum) {
  window.ethereum.on("accountsChanged", autoConnect);
  window.ethereum.on("chainChanged", () => window.location.reload());
}

// 🚀 Start
window.onload = async () => {
  await loadConfessions();
  await autoConnect();
};
</script>

</body>
</html>
