<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>
</head>
<body>

<h2>🕵️ Anonymous Confession Wall</h2>

<button onclick="connectWallet()">Connect Wallet</button>

<br><br>

<input id="message" placeholder="Write your confession..." />
<button onclick="postConfession()">Post (gas fee required)</button>

<br><br>

<input id="tipIndex" placeholder="Confession index" />
<button onclick="tip()">Tip ❤️</button>

<h3>📜 Confessions</h3>
<div id="confessionList"></div>

<!-- ✅ Stable ethers CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
const contractAddress = "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

const abi = [
  "function postConfession(string memory _message) payable",
  "function tipConfession(uint256 index) payable",
  "function getTotalConfessions() view returns (uint256)",
  "function confessions(uint256) view returns (string memory, uint256, uint256)"
];

let provider;
let signer;
let contract;

// ✅ Public provider (no wallet needed)
let readProvider = new ethers.providers.JsonRpcProvider("https://mainnet.base.org");
let readContract = new ethers.Contract(contractAddress, abi, readProvider);

// 🔹 Connect Wallet
async function connectWallet() {
  if (!window.ethereum) {
    alert("Please install MetaMask");
    return;
  }

  try {
    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: "0x2105" }]
    });

    contract = new ethers.Contract(contractAddress, abi, signer);

    alert("Wallet Connected ✅");

    await loadConfessions();

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
}

// 🔹 Post
async function postConfession() {
  if (!contract) {
    alert("Connect wallet first");
    return;
  }

  const msg = document.getElementById("message").value;

  if (!msg) {
    alert("Write something first");
    return;
  }

  const tx = await contract.postConfession(msg, {
    value: ethers.utils.parseEther("0.00001")
  });

  await tx.wait();
  alert("Confession Posted!");

  // ✅ Clear AFTER posting
  document.getElementById("message").value = "";

  await loadConfessions();
}

// 🔹 Tip
async function tip() {
  if (!contract) {
    alert("Connect wallet first");
    return;
  }

  const index = document.getElementById("tipIndex").value;

  const tx = await contract.tipConfession(index, {
    value: ethers.utils.parseEther("0.00001")
  });

  await tx.wait();
  alert("Tipped!");

  await loadConfessions();
}

// 🔥 Load (PUBLIC — no wallet needed)
async function loadConfessions() {
  try {
    const total = await readContract.getTotalConfessions();

    const list = document.getElementById("confessionList");
    list.innerHTML = "Loading... ⏳";

    // 🔥 Create all calls at once
    const promises = [];
    for (let i = 0; i < total; i++) {
      promises.push(readContract.confessions(i));
    }

    // 🔥 Wait all together (FAST)
    const results = await Promise.all(promises);

    list.innerHTML = "";

    results.reverse().forEach((c, i) => {
      const div = document.createElement("div");
      div.innerHTML = `
        <p><b>#${i}</b> ${c[0]}</p>
        <small>Tips: ${ethers.utils.formatEther(c[2])} ETH</small>
        <hr>
      `;
      list.appendChild(div);
    });

  } catch (err) {
    console.error("Load failed:", err);
  }
}
// 🔁 Auto connect (optional)
async function autoConnect() {
  if (!window.ethereum) return;

  const accounts = await window.ethereum.request({ method: "eth_accounts" });

  if (accounts.length > 0) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();

    const network = await provider.getNetwork();

    if (network.chainId !== 8453) return;

    contract = new ethers.Contract(contractAddress, abi, signer);

    await loadConfessions();
  }
}

// 🔁 Events
if (window.ethereum) {
  window.ethereum.on("accountsChanged", autoConnect);
  window.ethereum.on("chainChanged", () => window.location.reload());
}

// 🔁 Load on page start (IMPORTANT)
window.onload = async () => {
  await loadConfessions(); // 👈 now works without wallet
  await autoConnect();
};
</script>

</body>
</html>
