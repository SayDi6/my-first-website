<style>

html {
 scroll-behavior: smooth;
}

body {
 margin: 0;
 font-family: Arial, sans-serif;
 background: #f8f5f2;
 animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
 from { opacity: 0; transform: translateY(10px); }
 to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
header {
 background: linear-gradient(-45deg, #6b4226, #8b5e3c, #6b4226, #a47148);
 background-size: 300% 300%;
 animation: gradientMove 8s ease infinite, slideDown 0.8s ease;
 color: white;
 text-align: center;
 padding: 60px 20px;
 position: sticky;
 top: 0;
 z-index: 1000;
}

header h1 {
 font-size: 32px;
 margin: 0;
 letter-spacing: 3px;
 text-transform: uppercase;

 background: linear-gradient(90deg, #fff, #ffd9b3, #fff);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;

 animation: shineText 4s linear infinite;
}

header p {
 margin-top: 10px;
 font-size: 14px;
 opacity: 0.9;
}

/* animations */
@keyframes gradientMove {
 0% { background-position: 0% 50%; }
 50% { background-position: 100% 50%; }
 100% { background-position: 0% 50%; }
}

@keyframes shineText {
 0% { background-position: -200px; }
 100% { background-position: 200px; }
}

/* BUTTON */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;

    background: white;
    color: #6b4226;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    margin: 6px;
    transition: 0.3s;
}

.btn:hover {
 transform: scale(1.05);
}

/* SECTION */
section {
 max-width: 900px;
 margin: 25px auto;
 background: white;
 padding: 20px;
 border-radius: 12px;
 text-align: center;
 box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}
    .section-header {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 25px;
    background: #f1e6dc;
    color: #6b4226;
    font-size: 14px;
    margin-bottom: 15px;
    font-weight: 600;
}

.section-header h2 {
    margin: 0;
    font-size: 16px;
}
    .reach-us {
    max-width: 900px;
    margin: 25px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* 🔥 GALLERY FIX (MAIN PART) */
.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;

    border: 2px solid #e0d6cc;
    padding: 8px;
    border-radius: 12px;
    background: #fff;
}

.gallery img,
.gallery video {
 width: 100%;
 aspect-ratio: 1 / 1;
 object-fit: cover;
 border-radius: 6px;
 transition: 0.3s;
}

.gallery img:hover,
.gallery video:hover {
 transform: scale(1.05);
}

/* SERVICES */
.service {
 background: #f1f1f1;
 padding: 12px;
 margin: 10px 0;
 border-radius: 8px;
 transition: 0.3s;
}

.service:hover {
 transform: scale(1.02);
}

/* CONTACT */
.contact a {
 display: block;
 margin: 8px 0;
 color: #6b4226;
 text-decoration: none;
 font-weight: bold;
}

/* LIGHTBOX */
 .lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.95);

    display: none;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

.lightbox img {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
}

/* WHATSAPP FLOAT */
.whatsapp-btn {
 position: fixed;
 bottom: 20px;
 right: 20px;
 background: #25D366;
 color: white;
 font-size: 22px;
 padding: 14px;
 border-radius: 50%;
 text-decoration: none;
 z-index: 1000;
 transition: 0.3s;
}

.whatsapp-btn:hover {
 transform: scale(1.1);
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {

 header {
     padding: 40px 15px;
 }

 header h1 {
     font-size: 22px;
 }

 header p {
     font-size: 12px;
 }

 .btn {
     display: block;
     width: 85%;
     margin: 8px auto;
     font-size: 14px;
 }

 section {
     margin: 10px;
     padding: 15px;
 }

 /* 🔥 MOBILE GRID FIX */
 .gallery {
     grid-template-columns: repeat(3, 1fr);
 }

 .service {
     font-size: 13px;
 }
}
    .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    z-index: 10000;
    background: rgba(0,0,0,0.4);
    padding: 5px 10px;
    border-radius: 50%;
}

.close-btn:hover {
    background: rgba(0,0,0,0.7);
}

</style>
</head>

<script>
let sections = document.querySelectorAll("section");

function showSections() {
    sections.forEach(sec => {
        let rect = sec.getBoundingClientRect();

        if (rect.top < window.innerHeight - 100) {
            sec.classList.add("show");
        }
    });
}

window.addEventListener("scroll", showSections);
window.addEventListener("load", showSections);
    function openLightbox(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImg").src = img.src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
    function openVideo(video) {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
    video.play();
}
</script>
