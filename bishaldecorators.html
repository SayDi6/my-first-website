<!DOCTYPE html>
<html>
<head>
<title>Bishal Decorators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html {
 scroll-behavior: smooth;
}

body {
 margin: 0;
 font-family: Arial, sans-serif;
 background: #f8f5f2;
}

/* HEADER */
header {
 background: linear-gradient(-45deg, #6b4226, #8b5e3c, #6b4226, #a47148);
 background-size: 300% 300%;
 animation: gradientMove 8s ease infinite;
 color: white;
 text-align: center;
 padding: 45px 15px;
 position: sticky;
 top: 0;
 z-index: 1000;
}

header h1 {
 font-size: 24px;
 letter-spacing: 3px;
 margin-bottom: 8px;
}

header p {
 font-size: 13px;
 opacity: 0.85;
 margin-bottom: 20px;
}

/* BUTTON */
.btn {
 display: block;
 width: 90%;
 margin: 10px auto;
 padding: 14px;
 border-radius: 10px;
 font-size: 14px;
 background: rgba(255,255,255,0.95);
 color: #6b4226;
 text-decoration: none;
}

/* SECTION */
section {
 max-width: 900px;
 margin: 15px;
 background: white;
 padding: 15px;
 border-radius: 12px;
 text-align: center;
 box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* GALLERY */
.gallery {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 6px;
}

.gallery img,
.gallery video {
 width: 100%;
 aspect-ratio: 1/1;
 object-fit: cover;
 border-radius: 6px;
}

/* MOBILE */
@media (max-width: 600px) {
 .gallery {
   grid-template-columns: repeat(3, 1fr);
 }
}

/* LIGHTBOX */
.lightbox {
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: rgba(0,0,0,0.9);
 display: none;
 justify-content: center;
 align-items: center;
 z-index: 9999;
}

.lightbox img {
 max-width: 90%;
 max-height: 90%;
}

/* WHATSAPP FLOAT */
.whatsapp-btn {
 position: fixed;
 bottom: 20px;
 right: 20px;
 background: #25D366;
 padding: 14px;
 border-radius: 50%;
 z-index: 1000;
}

</style>
</head>

<body>

<header>
<h1>Bishal Decorators</h1>
<p>Making Your Events Beautiful</p>

<a class="btn" href="tel:6294848759">📞 Call Now</a>
<a class="btn" href="https://wa.me/916294848759" target="_blank">💬 WhatsApp</a>
</header>

<section>
<h2>✨ Our Work</h2>

<div class="gallery">

<img src="shilapandel.jpeg" onclick="openLightbox(this)">
<img src="shilapandel2.jpeg" onclick="openLightbox(this)">
<img src="shilapandel3.jpeg" onclick="openLightbox(this)">

<video onclick="openVideo(this)">
<source src="shilapandelvideo3.mp4">
</video>

</div>
</section>

<section>
<h2>🎉 Services</h2>

<div>Wedding Decoration</div>
<div>Birthday Decoration</div>
<div>Stage Decoration</div>
<div>Event Decoration</div>

</section>

<section>
<h2>📍 Reach Us</h2>

<p>Karidhya, Pipeline Road, Suri, Birbhum</p>

<a href="https://maps.app.goo.gl/jwKa1Lp1Rb7Fymyb7?g_st=aw" target="_blank">
📍 View Location on Google Maps
</a>

</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightboxImg">
</div>

<!-- FLOAT BUTTON -->
<a href="https://wa.me/916294848759" target="_blank" class="whatsapp-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<script>

/* IMAGE FULLSCREEN */
function openLightbox(img) {
 document.getElementById("lightbox").style.display = "flex";
 document.getElementById("lightboxImg").src = img.src;
}

function closeLightbox() {
 document.getElementById("lightbox").style.display = "none";
}

/* VIDEO FULLSCREEN */
function openVideo(video) {
 if (video.requestFullscreen) {
   video.requestFullscreen();
 }
 video.play();
}

</script>

</body>
</html>
