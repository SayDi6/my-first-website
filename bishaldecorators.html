<!DOCTYPE html>
<html>
<head>
<title>Bishal Decorators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
<style> 
  html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8f5f2;
    animation: fadeIn 0.8s ease-out;
}
@keyframes fadeIn {
    from { 
        opacity: 0;
        transform: translateY(10px);
    }
    to { 
        opacity: 1;
        transform: translateY(0);
    }
}

/* HEADER */
 header {
    background: linear-gradient(45deg, #6b4226, #8b5e3c);
    color: white;
    text-align: center;
    padding: 70px 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
    animation: slideDown 0.8s ease;
 }

 header h1 {
    font-size: 38px;
    margin: 0;
    letter-spacing: 1px;
    animation: fadeZoom 1s ease;
    transition: 0.3s;
}

header h1 {
    animation: floatText 3s ease-in-out infinite;
}
    
header p {
    margin-top: 10px;
    opacity: 0.9;
    animation: fadeInText 1.2s ease;
}
    @keyframes floatText {
    0% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-5px);
    }
    100% {
        transform: translateY(0);
    }
}

/* BUTTON */
.btn {
    background: white;
    color: #6b4226;
    padding: 12px 25px;
    border-radius: 6px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #f1f1f1;
}

/* SECTION */
section {
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

.gallery img, .gallery video {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover, .gallery video:hover {
    transform: scale(1.05);
}

/* SERVICES */
.service {
    background: #f1f1f1;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    transition: 0.3s;
}

.service:hover {
    background: #e0e0e0;
    transform: scale(1.02);
}

/* CONTACT */
.contact a {
    display: block;
    margin: 8px 0;
    color: #6b4226;
    text-decoration: none;
    font-weight: bold;
}
    .lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    animation: zoomIn 0.3s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.7); }
    to { transform: scale(1); }
}
    .whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    font-size: 24px;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    transition: 0.3s;
}

.whatsapp-btn:hover {
    transform: scale(1.1);
    background: #1ebe5d;
}
    @keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeZoom {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes fadeInText {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 0.9;
        transform: translateY(0);
    }
}
    
</style>
</head>

<body>

<header>

<p>Making Your Events Beautiful</p>

<script>
let sections = document.querySelectorAll("section");

function showSections() {
    sections.forEach(sec => {
        let rect = sec.getBoundingClientRect();

        if (rect.top < window.innerHeight - 100) {
            sec.classList.add("show");
        }
    });
}

window.addEventListener("scroll", showSections);
window.addEventListener("load", showSections);
    function openLightbox(img) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImg").src = img.src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg">
</div>

  </a>

</body>
</html>
