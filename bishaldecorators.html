<!DOCTYPE html>
<html>
<head>
<title>Bishal Decorators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
<style>
  html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8f5f2;
    animation: fadeIn 0.8s ease-out;
}
@keyframes fadeIn {
    from { 
        opacity: 0;
        transform: translateY(10px);
    }
    to { 
        opacity: 1;
        transform: translateY(0);
    }
}

/* HEADER */
header {
    background: linear-gradient(45deg, #6b4226, #8b5e3c);
    color: white;
    text-align: center;
    padding: 60px 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

header h1 {
    font-size: 36px;
    margin: 0;
}

header p {
    margin: 10px 0 20px;
}

/* BUTTON */
.btn {
    background: white;
    color: #6b4226;
    padding: 12px 25px;
    border-radius: 6px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #f1f1f1;
}

/* SECTION */
section {
    max-width: 900px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
}

.gallery img, .gallery video {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover, .gallery video:hover {
    transform: scale(1.05);
}

/* SERVICES */
.service {
    background: #f1f1f1;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    transition: 0.3s;
}

.service:hover {
    background: #e0e0e0;
    transform: scale(1.02);
}

/* CONTACT */
.contact a {
    display: block;
    margin: 8px 0;
    color: #6b4226;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>✨ Bishal Decorators</h1>
<p>Making Your Events Beautiful</p>

    <a class="btn" href="tel:6294848759">📞 Call Now</a>
    <a class="btn" href="https://wa.me/916294848759">💬 WhatsApp</a>
</header>

<section>
    <h2>✨ Our Work</h2>

    <div class="gallery">
        <!-- ADD YOUR IMAGES HERE -->
        <img src="shilapandel.jpeg">
        <img src="shilapandel2.jpeg">
        <img src="shilapandel3.jpeg">

        <!-- ADD VIDEO -->
        <video controls>
            <source src="shilapandelvideo3.mp4">
        </video>
    </div>
</section>

<section>
    <h2>🎉 Services</h2>

    <div class="service">Wedding Decoration</div>
    <div class="service">Birthday Decoration</div>
    <div class="service">Stage Decoration</div>
    <div class="service">Event Decoration</div>
</section>

<section class="contact">
    <h2>📍 Contact</h2>

    <p>Karidhya, Pipeline Road (near Ghosh Pukur), Suri, Birbhum</p>

    <a href="tel:6294848759">📞 6294848759</a>
    <a href="https://wa.me/916294848759">💬 WhatsApp Chat</a>
</section>
    
<script>
let sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    sections.forEach(sec => {
        let top = window.scrollY;
        let offset = sec.offsetTop - 300;
        let height = sec.offsetHeight;

        if (top > offset && top < offset + height) {
            sec.classList.add("show");
        }
    });
});
</script>
</body>
</html>
