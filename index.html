<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: yellow;
            animation: glow 2s infinite alternate;
        }

        h2 {
            color: lightblue;
        }

        p {
            font-size: 18px;
            margin: 10px;
        }

        #message {
            margin: 20px;
            font-size: 20px;
            color: lightgreen;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background: linear-gradient(45deg, yellow, orange);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, orange, red);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px yellow;
            }
            to {
                text-shadow: 0 0 25px orange;
            }
        }
    </style>
</head>

<body>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>

    <h1>Hello I'm Sayan 👋</h1>
    <h2>I am becoming a web developer 🚀</h2>
    <p>I can be king kong banging on my chest</p>
    <p>I can beat the world, I can beat the war.</p>

     <h2>About Me</h2>
     <p>I am learning web development and building my future step by step.</p>

     <h2>My Skills</h2>
     <p>Python, HTML, CSS (learning)</p>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = "I will become unstoppable 💪";
        }
    </script>

</body>
</html>
