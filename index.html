<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

    <style>
        body {
            background-color: #3e2c2c;
            color: white;
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: yellow;
            animation: glow 2s infinite alternate;
        }

        h2 {
            color: lightblue;
        }

        p {
            font-size: 18px;
            margin: 10px;
        }

        #message {
            margin: 20px;
            font-size: 20px;
            color: lightgreen;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background: linear-gradient(45deg, yellow, orange);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, orange, red);
        }

        /* CENTER TABLE */
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 300px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid white;
        }

        th {
            color: yellow;
        }

        tr:hover {
            background-color: #5a3d3d;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px yellow;
            }
            to {
                text-shadow: 0 0 25px orange;
            }
        }
    </style>
</head>

<body>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>

    <h1>Hello I'm Sayan 👋</h1>
    <h2>I am becoming a web developer 🚀</h2>
    <p>I can beat the world, I can beat the war.</p>

    <h2>About Me</h2>
    <p>I am learning web development and building my future step by step.</p>

    <h2>My Skills</h2>
    <p>Python, HTML, CSS (learning)</p>

    <h2>Crypto Prices</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Bitcoin</td>
            <td id="btc">Loading...</td>
        </tr>

        <tr>
            <td>Ethereum</td>
            <td id="eth">Loading...</td>
        </tr>
    </table>

<script>
function showMessage() {
    document.getElementById("message").innerText = "I will become unstoppable 💪";
}

async function getPrices() {
    try {
        // Bitcoin
        let btcRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
        let btcData = await btcRes.json();

        // Ethereum
        let ethRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT");
        let ethData = await ethRes.json();

        document.getElementById("btc").innerText = "$" + parseFloat(btcData.price).toFixed(2);
        document.getElementById("eth").innerText = "$" + parseFloat(ethData.price).toFixed(2);

    } catch (error) {
        document.getElementById("btc").innerText = "Error";
        document.getElementById("eth").innerText = "Error";
        console.log(error);
    }
}

getPrices();
setInterval(getPrices, 300);
</script>

</body>
</html>
