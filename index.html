<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>

    <style>
        body {
            background-color: #3e2c2c;
            color: white;
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: yellow;
            animation: glow 2s infinite alternate;
        }

        h2 {
            color: lightblue;
        }

        p {
            font-size: 18px;
            margin: 10px;
        }

        #message {
            margin: 20px;
            font-size: 15px;
            color: lightgreen;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background: linear-gradient(45deg, yellow, orange);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, orange, red);
        }

        /* CENTER TABLE */
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 300px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid white;
        }

        th {
            color: yellow;
        }

        tr:hover {
            background-color: #5a3d3d;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px yellow;
            }
            to {
                text-shadow: 0 0 25px orange;
            }
        }
    </style>
</head>

<body>

    <button onclick="showMessage()">Click Me</button>

    <p id="message"></p>

    <h1>Hello I'm Sayan 👋</h1>
    <h2>I am becoming a web developer 🚀</h2>
    <p>I can beat the world, I can beat the war.</p>

    <h2>About Me</h2>
    <p>I am learning web development and building my future step by step.</p>

    <h2>My Skills</h2>
    <p>Python, HTML, CSS (learning & developing)</p>

    <h2>Crypto Prices</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Bitcoin</td>
            <td id="btc">Wait bro...</td>
        </tr>

        <tr>
            <td>Ethereum</td>
            <td id="eth">Wait bro...</td>
        </tr>
    </table>

<script>
let prevBTC = null;
let prevETH = null;

function showMessage() {
    document.getElementById("message").innerText = "I'm becoming unstoppable 💪";
}

async function getPrices() {
    try {
        let btcRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
        let btcData = await btcRes.json();

        let ethRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT");
        let ethData = await ethRes.json();

        let btcPrice = parseFloat(btcData.price);
        let ethPrice = parseFloat(ethData.price);

        let btcElement = document.getElementById("btc");
        let ethElement = document.getElementById("eth");

        // BTC color logic
        if (prevBTC !== null) {
            if (btcPrice > prevBTC) {
                btcElement.style.color = "lightgreen";
            } else if (btcPrice < prevBTC) {
                btcElement.style.color = "red";
            }
        }

        // ETH color logic
        if (prevETH !== null) {
            if (ethPrice > prevETH) {
                ethElement.style.color = "lightgreen";
            } else if (ethPrice < prevETH) {
                ethElement.style.color = "red";
            }
        }

        // BTC arrow
        let btcArrow = "";
        if (prevBTC !== null) {
            if (btcPrice > prevBTC) btcArrow = " ↑";
            else if (btcPrice < prevBTC) btcArrow = " ↓";
        }

        // ETH arrow
        let ethArrow = "";
        if (prevETH !== null) {
            if (ethPrice > prevETH) ethArrow = " ↑";
            else if (ethPrice < prevETH) ethArrow = " ↓";
        }

        btcElement.innerText = "$" + btcPrice.toFixed(2) + btcArrow;
        ethElement.innerText = "$" + ethPrice.toFixed(2) + ethArrow;

        prevBTC = btcPrice;
        prevETH = ethPrice;

    } catch (error) {
        console.log(error);
    }
}

getPrices();
setInterval(getPrices, 2000);
</script>

</body>
</html>
