<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayan | Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        h2 {
            color: #66ccff;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        p {
            color: #ccc;
            line-height: 1.6;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(45deg, #ffd700, #ff8800);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: linear-gradient(45deg, #ff8800, #ff3300);
        }

        .message {
            margin-top: 15px;
            color: #00ff99;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .skill {
            padding: 8px 15px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Hello, I'm Sayan 👋</h1>
        <p>Aspiring Web Developer 🚀</p>

        <button class="btn" onclick="showMessage()">Click Me</button>
        <p id="msg" class="message"></p>

        <h2>About Me</h2>
        <p>
            I am focused on becoming a skilled web developer by building real projects daily 
            and improving my problem-solving ability.
        </p>

        <h2>Skills</h2>
        <div class="skills">
            <div class="skill">Python</div>
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
        </div>

    </div>
</div>

<script>
function showMessage() {
    document.getElementById("msg").innerText = "This is just the beginning 💪";
}
</script>

</body>
</html>
