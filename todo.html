<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        li {
            margin: 10px;
        }
    </style>
</head>

<body>

    <h1>My Todo App 📝</h1>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    let li = document.createElement("li");
    li.innerText = task;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
