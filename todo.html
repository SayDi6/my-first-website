<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            width: 70%;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin-left: 5px;
        }

        li {
            margin: 10px;
            background: #21262d;
            padding: 10px;
            border-radius: 5px;
            list-style: none;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My Todo App 📝</h1>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

</div>

<script>
let tasks = [];

// load saved tasks
window.onload = function () {
    let saved = localStorage.getItem("tasks");

    if (saved) {
        tasks = JSON.parse(saved);
        tasks.forEach(task => addTaskToUI(task));
    }
};

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    addTaskToUI(task);

    input.value = "";
}
    let input = document.getElementById("taskInput");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        addTask();
    }
});
    
function addTaskToUI(task) {
    let li = document.createElement("li");
    li.innerText = task;

    // mark complete
    li.onclick = function () {
        li.classList.toggle("completed");
    };

    // delete button
    let btn = document.createElement("button");
    btn.innerText = "❌";

    btn.onclick = function (event) {
        event.stopPropagation();
        li.remove();

        tasks = tasks.filter(t => t !== task);
        localStorage.setItem("tasks", JSON.stringify(tasks));
    };

    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);
}
</script>

</body>
</html>
