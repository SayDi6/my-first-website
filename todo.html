<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body {
            background: linear-gradient(135deg, #0d1117, #161b22);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 420px;
            margin: 100px auto;
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 12px;
            width: 65%;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #21262d;
            color: white;
        }

        button {
            padding: 12px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            margin-left: 5px;
            background: linear-gradient(45deg, #facc15, #f97316);
            color: black;
            font-weight: bold;
        }

        ul {
            padding: 0;
            margin-top: 20px;
        }

        li {
            margin: 10px 0;
            background: #21262d;
            padding: 12px;
            border-radius: 8px;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        li button {
            background: #ef4444;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        #taskCount {
            margin-top: 10px;
            color: lightgreen;
        }

        #emptyMsg {
            margin-top: 10px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My Todo App 📝</h1>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <p id="taskCount"></p>

    <ul id="taskList"></ul>

    <p id="emptyMsg">No tasks yet 👀</p>

</div>

<script>
let tasks = [];

// load saved tasks
window.onload = function () {
    let saved = localStorage.getItem("tasks");

    if (saved) {
        tasks = JSON.parse(saved);
        tasks.forEach(task => addTaskToUI(task));
    }

    updateCount();
    checkEmpty();
};

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let newTask = {
        text: task,
        completed: false,
        createdAt: Date.now(),
        completedAt: null
    };

    tasks.push(newTask);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    addTaskToUI(newTask);

    input.value = "";

    updateCount();
    checkEmpty();
}

// Enter key support
let input = document.getElementById("taskInput");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        addTask();
    }
});

function addTaskToUI(task) {
    let li = document.createElement("li");

    // text span (important fix)
    let textSpan = document.createElement("span");
    li.appendChild(textSpan);

    // reload completed state
    if (task.completed && task.completedAt) {
        li.classList.add("completed");

        let diff = task.completedAt - task.createdAt;
        let minutes = Math.floor(diff / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);

        textSpan.innerText = task.text + ` (Completed in ${minutes}m ${seconds}s)`;
    } else {
        textSpan.innerText = task.text;
    }

    // mark complete
    li.addEventListener("click", function () {
        li.classList.toggle("completed");

        task.completed = !task.completed;

        if (task.completed) {
            task.completedAt = Date.now();

            let diff = task.completedAt - task.createdAt;
            let minutes = Math.floor(diff / 60000);
            let seconds = Math.floor((diff % 60000) / 1000);

            textSpan.innerText = task.text + ` (Completed in ${minutes}m ${seconds}s)`;
        } else {
            task.completedAt = null;
            textSpan.innerText = task.text;
        }

        localStorage.setItem("tasks", JSON.stringify(tasks));
    });

    // delete button
    let btn = document.createElement("button");
    btn.innerText = "❌";

    btn.onclick = function (event) {
        event.stopPropagation();
        li.remove();

        // fixed delete logic
        tasks = tasks.filter(t => t !== task);

        localStorage.setItem("tasks", JSON.stringify(tasks));

        updateCount();
        checkEmpty();
    };

    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);
}

function updateCount() {
    document.getElementById("taskCount").innerText =
        "Total Tasks: " + tasks.length;
}

function checkEmpty() {
    let msg = document.getElementById("emptyMsg");

    if (tasks.length === 0) {
        msg.style.display = "block";
    } else {
        msg.style.display = "none";
    }
}
</script>

</body>
</html>
