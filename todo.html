<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

<style>
    body {
        background: linear-gradient(135deg, #0d1117, #161b22);
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .container {
        max-width: 420px;
        margin: 100px auto;
        background: #161b22;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        padding: 12px;
        width: 65%;
        border: none;
        border-radius: 8px;
        outline: none;
        background: #21262d;
        color: white;
    }

    button {
        padding: 12px 15px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        margin-left: 5px;
        background: linear-gradient(45deg, #facc15, #f97316);
        color: black;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        background: linear-gradient(45deg, #f97316, #ef4444);
    }

    ul {
        padding: 0;
        margin-top: 20px;
    }

    li {
        margin: 10px 0;
        background: #21262d;
        padding: 12px;
        border-radius: 8px;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
    }

    li:hover {
        background: #2a2f36;
        transform: scale(1.02);
    }

    .completed {
        text-decoration: line-through;
        color: gray;
    }

    li button {
        background: #ef4444;
        color: white;
        padding: 5px 10px;
        font-size: 12px;
    }

    li button:hover {
        background: #dc2626;
    }
</style>
</head>

<body>

<div class="container">

    <h1>My Todo App 📝</h1>

    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>

</div>

<script>
let tasks = [];

// load saved tasks
window.onload = function () {
    let saved = localStorage.getItem("tasks");

    if (saved) {
        tasks = JSON.parse(saved);
        tasks.forEach(task => addTaskToUI(task));
    }
};

function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") return;

    let newTask = {
        text: task,
        completed: false
    };

    tasks.push(newTask);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    addTaskToUI(newTask);

    input.value = "";
}

// Enter key support
let input = document.getElementById("taskInput");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        addTask();
    }
});

function addTaskToUI(task) {
    let li = document.createElement("li");
    li.innerText = task.text;

    if (task.completed) {
        li.classList.add("completed");
    }

    // mark complete
    li.onclick = function () {
        li.classList.toggle("completed");

        task.completed = !task.completed;

        localStorage.setItem("tasks", JSON.stringify(tasks));
    };

    // delete button
    let btn = document.createElement("button");
    btn.innerText = "❌";

    btn.onclick = function (event) {
        event.stopPropagation();
        li.remove();

        tasks = tasks.filter(t => t.text !== task.text);
        localStorage.setItem("tasks", JSON.stringify(tasks));
    };

    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);
}
</script>

</body>
</html>
